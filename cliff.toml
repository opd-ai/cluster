# git-cliff configuration for opd-ai/cluster changelog generation.
# Generates a CHANGELOG.md from conventional commits.
# Usage:
#   git-cliff --output CHANGELOG.md
#   git-cliff v0.1.0..HEAD --output CHANGELOG.md
#
# Conventional commit types recognised:
#   feat:     New feature → added to "Features" section
#   fix:      Bug fix → "Bug Fixes"
#   perf:     Performance improvement → "Performance"
#   refactor: Code refactoring → "Refactoring"
#   docs:     Documentation → "Documentation"
#   ci:       CI changes → omitted from user-facing changelog
#   chore:    Chores → omitted

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/).
This project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/opd-ai/cluster/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs",     group = "Documentation" },
  { message = "^style",    group = "Styling" },
  { message = "^test",     group = "Testing" },
  { message = "^build",    group = "Build System" },
  { message = "^ci",       skip = true },
  { message = "^chore",    skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9]*"
skip_tags = "v0\\.0\\.0-alpha"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
