# cluster/overlays/production/secrets-example.yaml
#
# Example of how a secret manifest looks BEFORE encryption with SOPS.
# DO NOT commit this file with real values — encrypt it first:
#
#   sops --encrypt secrets-example.yaml > minio-credentials.yaml
#   git add minio-credentials.yaml
#
# After encryption the `data` values will be ciphertext.
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: ai-cluster
type: Opaque
stringData:
  root-user: "REPLACE_WITH_REAL_VALUE"
  root-password: "REPLACE_WITH_REAL_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: monitoring
type: Opaque
stringData:
  admin-password: "REPLACE_WITH_REAL_VALUE"
