# cluster/overlays/production/registry.yaml
#
# Model registry service — tracks LLM bases, adapters, GGUFs, and image/video
# checkpoints with SHA256, size, license tag, and source URL.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: ai-cluster
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: ghcr.io/opd-ai/cluster/registry:latest
          env:
            - name: MINIO_ENDPOINT
              value: "storage.ai-cluster.svc.cluster.local:9000"
            - name: MINIO_BUCKET
              value: "models"
          ports:
            - containerPort: 8070
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8070
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: ai-cluster
  labels:
    app: registry
spec:
  selector:
    app: registry
  ports:
    - name: http
      port: 80
      targetPort: 8070
