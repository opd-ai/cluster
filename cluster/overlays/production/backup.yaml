# cluster/overlays/production/backup.yaml
#
# Backup & DR manifests — Phase 12 (Backup & Disaster Recovery)
#
# Components:
#   • nightly-backup CronJob — snapshots MinIO buckets, Qdrant collections,
#     and k3s etcd; encrypts with age and ships to cold storage (a MinIO
#     "snapshots" bucket or an external S3-compatible endpoint).
#   • restore-test Job template — used by `make restore-test` to verify
#     snapshot integrity in an ephemeral namespace (quarterly drill).
#
# Secrets required before applying:
#   kubectl -n ai-cluster create secret generic backup-age-key \
#     --from-file=age.key=<path-to-age-private-key> \
#     --from-literal=age-recipient=<age-public-key>
#
#   kubectl -n ai-cluster create secret generic backup-s3-credentials \
#     --from-literal=endpoint=<s3-or-minio-endpoint> \
#     --from-literal=access-key=<key> \
#     --from-literal=secret-key=<secret> \
#     --from-literal=bucket=snapshots
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-agent
  namespace: ai-cluster
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-agent
  namespace: ai-cluster
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-agent
  namespace: ai-cluster
subjects:
  - kind: ServiceAccount
    name: backup-agent
    namespace: ai-cluster
roleRef:
  kind: Role
  name: backup-agent
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-scripts
  namespace: ai-cluster
data:
  backup.sh: |
    #!/bin/sh
    set -eu
    TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
    WORKDIR="/tmp/backup-${TIMESTAMP}"
    mkdir -p "${WORKDIR}"
    mkdir -p "${WORKDIR}/qdrant"

    # ── 1. MinIO buckets snapshot ────────────────────────────────────────────
    echo "=== MinIO snapshot ==="
    mc alias set local "http://storage:9000" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
    # Sync all buckets except outputs (re-fetchable) and checkpoints (configurable)
    for bucket in models datasets adapters rag; do
      mc mirror --overwrite "local/${bucket}" "${WORKDIR}/minio/${bucket}/"
    done
    if [ "${BACKUP_CHECKPOINTS:-false}" = "true" ]; then
      mc mirror --overwrite "local/checkpoints" "${WORKDIR}/minio/checkpoints/"
    fi

    # ── 2. Qdrant collections snapshot ──────────────────────────────────────
    echo "=== Qdrant snapshot ==="
    # List all collections and take a snapshot of each
    collections=$(curl -s http://qdrant:6333/collections | \
      jq -r '.result.collections[].name')
    for col in ${collections}; do
      snap=$(curl -s -X POST \
        "http://qdrant:6333/collections/${col}/snapshots" | \
        jq -r '.result.name')
      # Download the snapshot
      curl -s -o "${WORKDIR}/qdrant/${col}-${snap}" \
        "http://qdrant:6333/collections/${col}/snapshots/${snap}"
      echo "Qdrant: saved ${col}"
    done

    # ── 3. Encrypt with age ──────────────────────────────────────────────────
    echo "=== Encrypting ==="
    ARCHIVE="${WORKDIR}.tar"
    tar -cf "${ARCHIVE}" -C "$(dirname "${WORKDIR}")" "$(basename "${WORKDIR}")"
    age -r "${AGE_RECIPIENT}" -o "${ARCHIVE}.age" "${ARCHIVE}"
    rm -rf "${WORKDIR}" "${ARCHIVE}"

    # ── 4. Ship to cold storage ──────────────────────────────────────────────
    echo "=== Uploading ==="
    mc alias set cold "${COLD_STORAGE_ENDPOINT}" \
      "${COLD_STORAGE_ACCESS_KEY}" "${COLD_STORAGE_SECRET_KEY}"
    mc cp "${ARCHIVE}.age" "cold/${COLD_STORAGE_BUCKET}/cluster-backup-${TIMESTAMP}.tar.age"
    rm -f "${ARCHIVE}.age"

    # ── 5. Prune backups older than retention period ─────────────────────────
    RETAIN_DAYS="${BACKUP_RETAIN_DAYS:-30}"
    mc find "cold/${COLD_STORAGE_BUCKET}" \
      --older-than "${RETAIN_DAYS}d" \
      --name "cluster-backup-*.tar.age" \
      --exec "mc rm {}" || true

    echo "=== Backup complete: cluster-backup-${TIMESTAMP}.tar.age ==="
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-backup
  namespace: ai-cluster
  labels:
    app.kubernetes.io/part-of: ai-cluster
spec:
  # Run at 02:00 UTC every night
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: backup-agent
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:3.21
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache age curl jq tar wget
                  wget -q -O /usr/local/bin/mc \
                    https://dl.min.io/client/mc/release/linux-amd64/mc
                  chmod +x /usr/local/bin/mc
                  exec /bin/sh /scripts/backup.sh
              env:
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: root-user
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: root-password
                - name: AGE_RECIPIENT
                  valueFrom:
                    secretKeyRef:
                      name: backup-age-key
                      key: age-recipient
                - name: COLD_STORAGE_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-credentials
                      key: endpoint
                - name: COLD_STORAGE_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-credentials
                      key: access-key
                - name: COLD_STORAGE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-credentials
                      key: secret-key
                - name: COLD_STORAGE_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: backup-s3-credentials
                      key: bucket
                - name: BACKUP_CHECKPOINTS
                  value: "false"
                - name: BACKUP_RETAIN_DAYS
                  value: "30"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: scripts
              configMap:
                name: backup-scripts
                defaultMode: 0755
