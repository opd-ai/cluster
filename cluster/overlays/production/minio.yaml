# cluster/overlays/production/minio.yaml
#
# MinIO deployment — S3-compatible object store for models, datasets,
# adapters, checkpoints, outputs, and RAG corpora.
# Buckets: models/, datasets/, adapters/, checkpoints/, outputs/, rag/, snapshots/, logs/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: ai-cluster
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      nodeSelector:
        role: storage
      containers:
        - name: minio
          image: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: data
          hostPath:
            path: /var/lib/aicluster/minio
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: storage
  namespace: ai-cluster
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
