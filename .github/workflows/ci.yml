name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@v5
      - name: Sync Python dev tools
        run: cd python && uv sync --extra dev
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: Install shell, yaml, and markdown linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint
          sudo npm install -g markdownlint-cli
      - name: Run lint suite
        run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run Go tests with race detector
        run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: js
            goarch: wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build targets
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOTOOLCHAIN: local
        run: |
          set -euo pipefail
          mkdir -p dist/${GOOS}-${GOARCH}
          if [ "${GOOS}/${GOARCH}" = "js/wasm" ]; then
            if go list ./cmd/console-wasm >/dev/null 2>&1; then
              go build -o dist/${GOOS}-${GOARCH}/console.wasm ./cmd/console-wasm
            else
              echo "cmd/console-wasm missing; skipping wasm build for scaffold stage"
            fi
            exit 0
          fi

          pkgs="$(go list ./cmd/... 2>/dev/null || true)"
          if [ -z "${pkgs}" ]; then
            echo "no cmd packages to build"
            exit 0
          fi

          for pkg in ${pkgs}; do
            name="$(basename "${pkg}")"
            go build -o "dist/${GOOS}-${GOARCH}/${name}" "${pkg}"
          done
      - name: Upload wasm artifact
        if: matrix.goos == 'js' && matrix.goarch == 'wasm' && hashFiles('dist/js-wasm/console.wasm') != ''
        uses: actions/upload-artifact@v4
        with:
          name: console-wasm
          path: dist/js-wasm/console.wasm

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1

  image-provenance:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    permissions:
      contents: read
      packages: write
      id-token: write  # required for keyless cosign signing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify third-party images are pinned by digest
        run: |
          set -euo pipefail
          unpinned=0
          # Extract all image references from cluster manifests
          while read -r img; do
            if echo "$img" | grep -qE '.+@sha256:[a-f0-9]{64}$'; then
              echo "OK (pinned): $img"
            else
              echo "WARN: $img is not pinned by digest" >&2
              unpinned=1
            fi
          done < <(
            grep -rh 'image:' cluster/overlays/production/ | \
              awk '{print $2}' | sort -u | \
              grep -v '^ghcr.io/opd-ai/'
          )
          if [ "$unpinned" -ne 0 ]; then
            exit 1
          fi
      - name: Sign built images with cosign (keyless)
        run: |
          set -euo pipefail
          for svc in gateway rag console; do
            img="ghcr.io/opd-ai/cluster/${svc}:latest"
            # Resolve digest and sign if image exists in registry
            digest=$(cosign triangulate --type=digest "$img" 2>/dev/null || true)
            if [ -n "$digest" ]; then
              cosign sign --yes "$img"
              echo "Signed $img"
            else
              echo "Image $img not found in registry; skipping signing"
            fi
          done

  sbom:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-${{ github.sha }}.spdx.json
      - name: Vulnerability scan with grype
        uses: anchore/scan-action@v4
        with:
          sbom: sbom.spdx.json
          fail-build: false
          severity-cutoff: critical
