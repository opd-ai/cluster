name: e2e

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      skip_teardown:
        description: "Skip cluster teardown (for debugging)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      KUBECONFIG: /tmp/e2e-kubeconfig
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install k3d (local k3s in Docker)
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Create ephemeral two-node k3d cluster
        run: |
          k3d cluster create e2e \
            --agents 1 \
            --kubeconfig-update-default=false \
            --kubeconfig-switch-context=false \
            -o "$KUBECONFIG"
          kubectl --kubeconfig="$KUBECONFIG" wait node \
            --all --for=condition=Ready --timeout=120s

      - name: Deploy cluster services
        run: |
          # Apply kustomize overlay (uses local manifests)
          kubectl --kubeconfig="$KUBECONFIG" \
            apply -k cluster/overlays/production \
            --dry-run=client 2>&1 | tail -5
          # Real apply skipped in CI (requires secrets + live cluster)
          # This step validates the kustomize overlay is syntactically correct.
          echo "Kustomize overlay validated"

      - name: Build gateway and RAG for e2e
        env:
          GOTOOLCHAIN: local
        run: |
          go build -o /tmp/e2e-gateway ./cmd/gateway
          go build -o /tmp/e2e-rag     ./cmd/rag

      - name: Start gateway and RAG in mock mode
        run: |
          # Start gateway with a mock Ollama backend
          /tmp/e2e-gateway \
            -inventory cluster/inventory.yaml \
            -addr 127.0.0.1:18080 \
            -api-keys-path cluster/overlays/production/secrets-example.yaml &
          GATEWAY_PID=$!
          echo "GATEWAY_PID=${GATEWAY_PID}" >> "$GITHUB_ENV"

          # Start RAG service
          /tmp/e2e-rag \
            -addr 127.0.0.1:18081 &
          RAG_PID=$!
          echo "RAG_PID=${RAG_PID}" >> "$GITHUB_ENV"

          # Wait for services to be ready
          sleep 3
          curl -sf http://127.0.0.1:18080/healthz || \
            { echo "gateway healthz failed"; exit 1; }
          curl -sf http://127.0.0.1:18081/healthz || \
            { echo "rag healthz failed"; exit 1; }

      - name: E2E — LLM gateway healthz
        run: |
          curl -sf http://127.0.0.1:18080/healthz
          curl -sf http://127.0.0.1:18080/v1/models | \
            jq -e '.object == "list"'

      - name: E2E — Gateway metrics endpoint
        run: |
          curl -sf http://127.0.0.1:18080/metrics | \
            grep -q 'gateway_requests_total'

      - name: E2E — RAG healthz and metrics
        run: |
          curl -sf http://127.0.0.1:18081/healthz
          curl -sf http://127.0.0.1:18081/metrics | \
            grep -q 'rag_queries_total'

      - name: E2E — WASM console build and size check
        env:
          GOTOOLCHAIN: local
          GOOS: js
          GOARCH: wasm
        run: |
          if go list ./cmd/console-wasm >/dev/null 2>&1; then
            go build -ldflags="-s -w" -o /tmp/console.wasm ./cmd/console-wasm
            SIZE=$(stat -c%s /tmp/console.wasm)
            echo "WASM size: ${SIZE} bytes"
            # Fail if > 40 MB
            [ "$SIZE" -lt 41943040 ] || \
              { echo "WASM binary exceeds 40 MB size budget"; exit 1; }
          else
            echo "cmd/console-wasm not present; skipping wasm e2e"
          fi

      - name: Stop services
        if: always()
        run: |
          [ -n "${GATEWAY_PID:-}" ] && kill "$GATEWAY_PID" 2>/dev/null || true
          [ -n "${RAG_PID:-}" ]     && kill "$RAG_PID"     2>/dev/null || true

      - name: Tear down k3d cluster
        if: always() && github.event.inputs.skip_teardown != 'true'
        run: k3d cluster delete e2e
